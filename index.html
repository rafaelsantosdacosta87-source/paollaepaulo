<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paolla & Paulo — 13.07.2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --marrom:        #130706;
      --marrom-medio:  #2A0F0C;
      --marrom-claro:  #6B2D1A;
      --creme:         #F3EBE0;
      --creme-escuro:  #E2D0BB;
      --dourado:       #C9A96E;
      --dourado-claro: #E8D4A8;
      --branco:        #FAF6F0;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--branco); color: var(--marrom); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      background: var(--marrom);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 80px 24px 0;
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 10%, rgba(201,169,110,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 100% 40% at 50% 100%, rgba(61,24,16,0.9) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .hero-content { position: relative; z-index: 2; padding-bottom: clamp(200px,34vw,360px); }

    /* Imagens de Assinatura */
    .hero-pre {
      font-family: 'Cinzel', serif; font-size: clamp(9px,1.8vw,11px);
      letter-spacing: 0.45em; color: var(--dourado); text-transform: uppercase;
      margin-bottom: 20px; animation: fadeUp 1s 0.4s both;
    }
    .hero-rule {
      width: 1px; height: 64px;
      background: linear-gradient(to bottom, transparent, var(--dourado), transparent);
      margin: 28px auto; animation: fadeIn 1s 1.2s both;
    }
    .hero-date {
      font-family: 'Cinzel', serif; font-size: clamp(12px,2.2vw,17px);
      letter-spacing: 0.3em; color: var(--dourado-claro);
      animation: fadeUp 1s 1.4s both;
    }
    .hero-loc {
      font-size: clamp(12px,1.8vw,15px); font-style: italic;
      color: rgba(243,235,224,0.45); margin-top: 10px;
      animation: fadeUp 1s 1.6s both;
    }
    .hero-verse {
      margin-top: 32px; font-size: clamp(11px,1.6vw,13px);
      font-style: italic; color: rgba(201,169,110,0.5);
      max-width: 440px; line-height: 1.8;
      animation: fadeUp 1s 1.9s both;
    }
    .scroll-hint {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%); color: var(--dourado); opacity: 0.35; font-size: 18px;
      animation: bounce 2.2s infinite; z-index: 3;
    }

    /* ── SERRA AJUSTADA ── */
    .serra-hero {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: clamp(220px, 38vw, 380px);
      pointer-events: none; z-index: 1;
    }
    .serra-hero-mob { display: none; }

    @media (max-width: 600px) {
      .serra-hero { display: none; }
      .serra-hero-mob {
        display: block;
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100vw;
        height: 65vh;
        max-height: 520px;
        pointer-events: none;
        z-index: 1;
      }
      .hero-content { 
        padding-bottom: 400px; 
        padding-top: 60px;
      }
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(19,7,6,0.97); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,169,110,0.12);
    }
    nav ul { display: flex; justify-content: center; gap: clamp(8px,2.5vw,32px); list-style: none; padding: 14px 16px; flex-wrap: wrap; }
    nav a { font-family: 'Cinzel', serif; font-size: 9.5px; letter-spacing: 0.22em; color: var(--dourado-claro); text-decoration: none; text-transform: uppercase; transition: color 0.3s; }
    nav a:hover { color: var(--dourado); }

    /* ── OUTRAS SEÇÕES (Simplificadas para o código pronto) ── */
    section { padding: clamp(64px,10vw,116px) clamp(24px,8vw,100px); }
    .sec-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.4em; color: var(--marrom-claro); text-transform: uppercase; text-align: center; margin-bottom: 14px; }
    .sec-title { font-size: clamp(34px,5.5vw,58px); font-weight: 300; text-align: center; color: var(--marrom); line-height: 1.1; margin-bottom: 40px; }
    .sec-title em { font-style: italic; color: var(--marrom-claro); }
    .reveal { opacity:0; transform:translateY(28px); transition: opacity 0.85s ease, transform 0.85s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* ── ANIMAÇÕES ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(7px);} }
  </style>
</head>
<body>

<section id="hero">
  <div class="hero-content">
    <img src="./monograma.png" alt="PP" style="display:block; margin:0 auto 16px; width: clamp(80px,12vw,110px); height:auto; filter: brightness(0) saturate(100%) invert(80%) sepia(30%) saturate(500%) hue-rotate(5deg) brightness(1.25); opacity:0.82; animation: fadeUp 1s 0.2s both;">
    <p class="hero-pre">Celebração do Matrimônio</p>
    <img src="./nomes.png" alt="Paolla e Paulo" style="display:block; margin:0 auto; width: min(780px, 90vw); height:auto; filter: brightness(0) invert(1); opacity:0.95; animation: fadeUp 1.2s 0.6s both;">
    <div class="hero-rule"></div>
    <p class="hero-date">13 · 07 · 2026</p>
    <p class="hero-loc">Casa Ville Verte · Teresópolis, RJ</p>
    <p class="hero-verse">
      "Para que todos vejam, e saibam, e considerem, e juntamente entendam<br>
      que a mão do Senhor fez isto..." — Isaías 41:20
    </p>
  </div>

  <svg class="serra-hero" viewBox="0 0 1440 380" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <path fill="#C9A96E" fill-opacity="0.16" d="M0,380 L0,340 C150,330 250,220 320,230 C380,240 430,320 550,310 C620,300 640,240 680,240 C710,240 730,300 800,310 C900,320 950,150 1020,150 C1080,150 1150,280 1250,270 C1350,260 1400,180 1440,160 L1440,380 Z"/>
  </svg>

  <svg class="serra-hero-mob" viewBox="0 0 400 480" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <path fill="#C9A96E" fill-opacity="0.06" d="M 0,480 L 0,123 L 400,123 L 400,480 Z"/>
    <path fill="#a06030" fill-opacity="0.1" d="M 0,480 L 0,167 L 400,167 L 400,480 Z"/>
    <path fill="#321006" fill-opacity="0.82" d="M 0,480 L 0,270 L 190,40 L 210,40 L 400,270 L 400,480 Z"/>
  </svg>
  
  <div class="scroll-hint">↓</div>
</section>

<nav>
  <ul>
    <li><a href="#contagem">Contagem</a></li>
    <li><a href="#historia">História</a></li>
    <li><a href="#confirmacao">Confirmação</a></li>
  </ul>
</nav>

<script>
  // Script para animação de revelação
  document.querySelectorAll('.reveal').forEach(el => {
    new IntersectionObserver(([e]) => { if(e.isIntersecting) e.target.classList.add('visible'); },{threshold:0.1}).observe(el);
  });
</script>

</body>
</html>
